apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nri-plugin-identity
spec:
  template:
    spec:
      containers:
        - name: nri-plugin-identity
          image: plugin:latest
          args:
            - "--idx"
            - "11"
            - "--verbose"
            - "true"
            - "--spire-admin-socket"
            - "unix:///run/spire/admin-socket/admin.sock"
            - "--host-mount-path"
            - "/var/run/spiffe/secrets/"
          resources:
            requests:
              cpu: "2m"
              memory: "5Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nri-socket
              mountPath: /var/run/nri/nri.sock
            - name: spire-admin-socket
              mountPath: /run/spire/admin-socket/admin.sock
            - name: spiffe-certs
              mountPath: /var/run/spiffe/secrets/
      volumes:
        - name: nri-socket
          hostPath:
            path: /var/run/nri/nri.sock
            type: Socket
        - name: spire-admin-socket
          hostPath:
            path: /run/spire/admin-socket/admin.sock
            type: Socket
        - name: spiffe-certs
          hostPath:
            path: /var/run/spiffe/secrets/
            type: DirectoryOrCreate
