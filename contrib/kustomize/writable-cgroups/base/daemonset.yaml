apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nri-plugin-writable-cgroups
spec:
  template:
    spec:
      containers:
        - name: plugin
          image: plugin:latest
          args:
            - "-idx"
            - "10"
          resources:
            requests:
              cpu: "2m"
              memory: "5Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nri-socket
              mountPath: /var/run/nri/nri.sock
            - name: host-mountinfo
              mountPath: /host/proc/1/mountinfo
              readOnly: true
      volumes:
        - name: nri-socket
          hostPath:
            path: /var/run/nri/nri.sock
            type: Socket
        - name: host-mountinfo
          hostPath:
            path: /proc/1/mountinfo
            type: File
