apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nri-plugin-hook-injector
spec:
  template:
    spec:
      containers:
        - name: plugin
          image: "ghcr.io/containerd/nri/plugins/hook-injector:unstable"
          imagePullPolicy: Always
          args:
            - "-idx"
            - "10"
            - "-name"
            - "hook-injector"
          volumeMounts:
            - name: nri-socket
              mountPath: /var/run/nri/nri.sock
            - name: etc-hooks-d
              mountPath: /etc/containers/oci/hooks.d
              readOnly: true
            - name: usr-share-hooks-d
              mountPath: /usr/share/containers/oci/hooks.d
              readOnly: true
            - name: libexec-hooks-d
              mountPath: /usr/libexec/oci/hooks.d
              readOnly: true
      volumes:
      - name: nri-socket
        hostPath:
          path: /var/run/nri/nri.sock
          type: Socket
      - name: etc-hooks-d
        hostPath:
          path: /etc/containers/oci/hooks.d
          type: DirectoryOrCreate
      - name: usr-share-hooks-d
        hostPath:
          path: /usr/share/containers/oci/hooks.d
          type: DirectoryOrCreate
      - name: libexec-hooks-d
        hostPath:
          path: /usr/libexec/oci/hooks.d
          type: DirectoryOrCreate
