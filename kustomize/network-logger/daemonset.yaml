apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nri-plugin-network-logger
spec:
  template:
    spec:
      containers:
        - name: plugin
          image: "ghcr.io/containerd/nri/plugins/network-logger:unstable"
          imagePullPolicy: Always
          args:
            - "-idx"
            - "10"
            - "-network-logger"
            - "network-logger"
          volumeMounts:
            - name: nri-socket
              mountPath: /var/run/nri/nri.sock
      volumes:
      - name: nri-socket
        hostPath:
          path: /var/run/nri/nri.sock
          type: Socket
